<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COSMEMO</title>
  <style>
    :root {
      --bg: #050716;
      --panel: rgba(13, 18, 42, 0.78);
      --panel-strong: rgba(18, 25, 55, 0.92);
      --text: #f4f7ff;
      --muted: #aab4d6;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #9fb7ff;
      --danger: #ff8f9f;
      --danger-bg: rgba(255, 143, 159, 0.12);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    body {
      overflow-x: hidden;
    }

    #starCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(82, 113, 255, 0.16), transparent 34%),
        radial-gradient(circle at 80% 30%, rgba(184, 116, 255, 0.12), transparent 32%),
        linear-gradient(180deg, #07091d 0%, #02030b 100%);
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: min(920px, 100%);
      min-height: min(760px, calc(100vh - 44px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    header,
    main,
    footer {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    header {
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 2.15rem);
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 94px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
      text-align: right;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
    }

    .stat strong {
      display: block;
      margin-top: 2px;
      font-size: 1.05rem;
      font-variant-numeric: tabular-nums;
    }

    main {
      border-radius: var(--radius);
      padding: 20px;
      background: var(--panel-strong);
      overflow: hidden;
    }

    footer {
      border-radius: 18px;
      padding: 12px 16px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
    }

    .screen {
      display: none;
      height: 100%;
    }

    .screen.active {
      display: block;
    }

    .screen-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.24);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: rgba(159, 183, 255, 0.22);
      border-color: rgba(159, 183, 255, 0.45);
    }

    button.danger {
      color: #ffdfe4;
      background: var(--danger-bg);
      border-color: rgba(255, 143, 159, 0.34);
    }

    button.ghost {
      background: transparent;
    }

    textarea {
      width: 100%;
      min-height: min(46vh, 420px);
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      padding: 16px;
      font: inherit;
      line-height: 1.75;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(159, 183, 255, 0.62);
      box-shadow: 0 0 0 4px rgba(159, 183, 255, 0.08);
    }

    .form-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
    }

    .message {
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.9rem;
      margin-right: auto;
    }

    .cards {
      display: grid;
      gap: 12px;
      max-height: 560px;
      overflow: auto;
      padding-right: 4px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.065);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .card-main {
      min-width: 0;
      cursor: pointer;
    }

    .card-preview {
      margin: 0;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .card-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty {
      border: 1px dashed rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .detail-body {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.065);
      padding: 18px;
      min-height: 280px;
      max-height: 56vh;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.8;
    }

    .detail-editor {
      min-height: 280px;
      max-height: 56vh;
    }

    .edit-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .detail-meta {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.86rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .confirm {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.54);
    }

    .confirm.active {
      display: flex;
    }

    .confirm-box {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #101632;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .confirm-box p {
      margin: 0 0 16px;
      line-height: 1.7;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
        align-items: stretch;
      }

      .shell {
        min-height: calc(100vh - 24px);
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .stats {
        justify-content: stretch;
      }

      .stat {
        flex: 1;
        text-align: left;
      }

      main {
        padding: 16px;
      }

      .screen-head {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar,
      .form-actions {
        justify-content: stretch;
      }

      button {
        flex: 1;
      }

      .card {
        grid-template-columns: 1fr;
      }

      .card > button {
        justify-self: stretch;
      }
    }
  </style>
</head>
<body>
  <canvas id="starCanvas" aria-hidden="true"></canvas>

  <div class="app">
    <div class="shell">
      <header>
        <div class="brand">
          <h1>COSMEMO</h1>
          <div class="subtitle">捨てた言葉が、星になる。</div>
        </div>
        <div class="stats" aria-label="統計">
          <div class="stat">
            <span>保存中</span>
            <strong id="memoCount">0</strong>
          </div>
          <div class="stat">
            <span>削除文字数</span>
            <strong id="deletedChars">0</strong>
          </div>
          <div class="stat">
            <span>星</span>
            <strong id="starCount">0</strong>
          </div>
        </div>
      </header>

      <main>
        <section id="writeScreen" class="screen active" aria-label="メモを書く">
          <div class="screen-head">
            <h2>メモを書く</h2>
            <div class="toolbar">
              <button type="button" id="goListFromWrite">一覧</button>
            </div>
          </div>

          <textarea id="memoBody" placeholder="ここにメモを書く..." maxlength="20000"></textarea>

          <div class="form-actions">
            <div id="writeMessage" class="message" role="status"></div>
            <button type="button" id="clearDraft" class="ghost">入力を消す</button>
            <button type="button" id="saveMemo" class="primary">保存</button>
          </div>
        </section>

        <section id="listScreen" class="screen" aria-label="メモ一覧">
          <div class="screen-head">
            <h2>メモ一覧</h2>
            <div class="toolbar">
              <button type="button" id="goWriteFromList">書く</button>
            </div>
          </div>
          <div id="memoCards" class="cards"></div>
        </section>

        <section id="detailScreen" class="screen" aria-label="メモ詳細">
          <div class="screen-head">
            <h2>メモ詳細</h2>
            <div class="toolbar">
              <button type="button" id="backToList">一覧へ</button>
              <button type="button" id="editFromDetail" hidden>編集</button>
              <button type="button" id="deleteFromDetail" class="danger">削除</button>
            </div>
          </div>

          <div id="detailMeta" class="detail-meta"></div>
          <div id="detailBody" class="detail-body" hidden></div>
          <textarea id="detailEditor" class="detail-editor" maxlength="20000"></textarea>
          <div id="editActions" class="edit-actions">
            <button type="button" id="cancelEdit" class="ghost">キャンセル</button>
            <button type="button" id="saveEdit" class="primary">保存</button>
          </div>
        </section>
      </main>

      <footer>
        このページはブラウザの LocalStorage にのみ保存します。別端末との同期、バックアップ、サーバー保存は行いません。
      </footer>
    </div>
  </div>

  <div id="confirmDialog" class="confirm" role="dialog" aria-modal="true" aria-label="削除確認">
    <div class="confirm-box">
      <p id="confirmText">このメモを削除しますか。</p>
      <div class="confirm-actions">
        <button type="button" id="cancelDelete">キャンセル</button>
        <button type="button" id="confirmDelete" class="danger">削除する</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEYS = {
        memos: "starMemo.memos.v1",
        deletedChars: "starMemo.deletedChars.v1",
        draft: "starMemo.draft.v1"
      };

      const STAR_RATIO = 30;
      const MAX_STARS = 900;

      const state = {
        memos: [],
        deletedChars: 0,
        currentMemoId: null,
        pendingDeleteId: null
      };

      const els = {
        canvas: document.getElementById("starCanvas"),
        memoCount: document.getElementById("memoCount"),
        deletedChars: document.getElementById("deletedChars"),
        starCount: document.getElementById("starCount"),

        writeScreen: document.getElementById("writeScreen"),
        listScreen: document.getElementById("listScreen"),
        detailScreen: document.getElementById("detailScreen"),

        memoBody: document.getElementById("memoBody"),
        writeMessage: document.getElementById("writeMessage"),
        saveMemo: document.getElementById("saveMemo"),
        clearDraft: document.getElementById("clearDraft"),

        goListFromWrite: document.getElementById("goListFromWrite"),
        goWriteFromList: document.getElementById("goWriteFromList"),
        backToList: document.getElementById("backToList"),

        memoCards: document.getElementById("memoCards"),
        detailMeta: document.getElementById("detailMeta"),
        detailBody: document.getElementById("detailBody"),
        detailEditor: document.getElementById("detailEditor"),
        editActions: document.getElementById("editActions"),
        editFromDetail: document.getElementById("editFromDetail"),
        cancelEdit: document.getElementById("cancelEdit"),
        saveEdit: document.getElementById("saveEdit"),
        deleteFromDetail: document.getElementById("deleteFromDetail"),

        confirmDialog: document.getElementById("confirmDialog"),
        confirmText: document.getElementById("confirmText"),
        cancelDelete: document.getElementById("cancelDelete"),
        confirmDelete: document.getElementById("confirmDelete")
      };

      function loadState() {
        state.memos = safeJsonParse(localStorage.getItem(STORAGE_KEYS.memos), []);
        state.memos = state.memos
          .filter((memo) => memo && typeof memo.body === "string")
          .map((memo) => ({
            id: String(memo.id || makeId()),
            body: memo.body,
            createdAt: Number(memo.createdAt || Date.now())
          }));

        state.deletedChars = Number(localStorage.getItem(STORAGE_KEYS.deletedChars) || 0);
        if (!Number.isFinite(state.deletedChars) || state.deletedChars < 0) {
          state.deletedChars = 0;
        }

        els.memoBody.value = localStorage.getItem(STORAGE_KEYS.draft) || "";
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEYS.memos, JSON.stringify(state.memos));
        localStorage.setItem(STORAGE_KEYS.deletedChars, String(state.deletedChars));
      }

      function safeJsonParse(value, fallback) {
        try {
          return value ? JSON.parse(value) : fallback;
        } catch {
          return fallback;
        }
      }

      function makeId() {
        if (crypto && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return String(Date.now()) + "-" + Math.random().toString(16).slice(2);
      }

      function showScreen(name) {
        els.writeScreen.classList.toggle("active", name === "write");
        els.listScreen.classList.toggle("active", name === "list");
        els.detailScreen.classList.toggle("active", name === "detail");

        if (name !== "detail") {
          setEditing(false);
        }

        if (name === "list") {
          renderList();
        }
        if (name === "detail") {
          renderDetail();
        }

        renderStats();
        drawStars();
      }

      function saveMemo() {
        const body = els.memoBody.value.trim();

        if (!body) {
          showMessage("本文が空です。");
          return;
        }

        state.memos.unshift({
          id: makeId(),
          body,
          createdAt: Date.now()
        });

        els.memoBody.value = "";
        localStorage.removeItem(STORAGE_KEYS.draft);
        saveState();
        renderStats();
        showMessage("保存しました。");
      }

      function showMessage(text) {
        els.writeMessage.textContent = text;
        window.clearTimeout(showMessage.timer);
        showMessage.timer = window.setTimeout(() => {
          els.writeMessage.textContent = "";
        }, 2200);
      }

      function renderStats() {
        const starCount = getStarCount();
        els.memoCount.textContent = String(state.memos.length);
        els.deletedChars.textContent = state.deletedChars.toLocaleString("ja-JP");
        els.starCount.textContent = starCount.toLocaleString("ja-JP");
      }

      function renderList() {
        if (state.memos.length === 0) {
          els.memoCards.innerHTML = '<div class="empty">保存済みのメモはありません。<br>書いたメモを保存すると、ここに表示されます。</div>';
          return;
        }

        els.memoCards.innerHTML = "";

        for (const memo of state.memos) {
          const card = document.createElement("article");
          card.className = "card";

          const main = document.createElement("div");
          main.className = "card-main";
          main.tabIndex = 0;
          main.setAttribute("role", "button");
          main.setAttribute("aria-label", "メモ詳細を開く");

          const preview = document.createElement("p");
          preview.className = "card-preview";
          preview.textContent = makePreview(memo.body, 120);

          const meta = document.createElement("div");
          meta.className = "card-meta";
          meta.innerHTML = `<span>${formatDate(memo.createdAt)}</span><span>${countChars(memo.body)}文字</span>`;

          main.append(preview, meta);
          main.addEventListener("click", () => openDetail(memo.id));
          main.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openDetail(memo.id);
            }
          });

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "danger";
          deleteButton.textContent = "削除";
          deleteButton.addEventListener("click", () => requestDelete(memo.id));

          card.append(main, deleteButton);
          els.memoCards.appendChild(card);
        }
      }

      function openDetail(id) {
        state.currentMemoId = id;
        setEditing(false);
        showScreen("detail");
      }

      function renderDetail() {
        const memo = state.memos.find((item) => item.id === state.currentMemoId);

        if (!memo) {
          state.currentMemoId = null;
          showScreen("list");
          return;
        }

        els.detailMeta.innerHTML = `<span>${formatDate(memo.createdAt)}</span><span>${countChars(memo.body)}文字</span>`;
        els.detailBody.textContent = memo.body;
        els.detailEditor.value = memo.body;
        setEditing(true);
      }

      function startEdit() {
        const memo = state.memos.find((item) => item.id === state.currentMemoId);
        if (!memo) return;

        els.detailEditor.value = memo.body;
        setEditing(true);
        els.detailEditor.focus();
      }

      function cancelEdit() {
        const memo = state.memos.find((item) => item.id === state.currentMemoId);
        if (memo) {
          els.detailEditor.value = memo.body;
        }
        els.detailEditor.focus();
      }

      function saveEdit() {
        const memo = state.memos.find((item) => item.id === state.currentMemoId);
        if (!memo) return;

        const body = els.detailEditor.value;
        if (!body.trim()) {
          els.detailEditor.focus();
          return;
        }

        memo.body = body;
        saveState();
        setEditing(false);
        showScreen("list");
      }

      function setEditing(isEditing) {
        els.detailBody.hidden = isEditing;
        els.detailEditor.hidden = !isEditing;
        els.editActions.hidden = !isEditing;
        els.editFromDetail.hidden = true;
      }

      function requestDelete(id) {
        const memo = state.memos.find((item) => item.id === id);
        if (!memo) return;

        state.pendingDeleteId = id;
        els.confirmText.textContent = `${countChars(memo.body)}文字のメモを削除します。削除文字数として星に変換されます。`;
        els.confirmDialog.classList.add("active");
      }

      function cancelDelete() {
        state.pendingDeleteId = null;
        els.confirmDialog.classList.remove("active");
      }

      function confirmDelete() {
        const id = state.pendingDeleteId;
        const memo = state.memos.find((item) => item.id === id);

        if (!memo) {
          cancelDelete();
          return;
        }

        state.deletedChars += countChars(memo.body);
        state.memos = state.memos.filter((item) => item.id !== id);

        if (state.currentMemoId === id) {
          state.currentMemoId = null;
        }

        saveState();
        cancelDelete();

        if (els.detailScreen.classList.contains("active")) {
          showScreen("list");
        } else {
          renderList();
          renderStats();
          drawStars();
        }
      }

      function countChars(text) {
        return Array.from(text || "").length;
      }

      function makePreview(text, length) {
        const chars = Array.from((text || "").replace(/\s+/g, " ").trim());
        if (chars.length <= length) return chars.join("");
        return chars.slice(0, length).join("") + "…";
      }

      function formatDate(timestamp) {
        const date = new Date(timestamp);
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(date);
      }

      function getStarCount() {
        return Math.min(MAX_STARS, Math.floor(state.deletedChars / STAR_RATIO));
      }

      function resizeCanvas() {
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        const width = Math.floor(window.innerWidth * dpr);
        const height = Math.floor(window.innerHeight * dpr);

        if (els.canvas.width !== width || els.canvas.height !== height) {
          els.canvas.width = width;
          els.canvas.height = height;
          els.canvas.style.width = window.innerWidth + "px";
          els.canvas.style.height = window.innerHeight + "px";
        }

        drawStars();
      }

      function drawStars() {
        const canvas = els.canvas;
        const ctx = canvas.getContext("2d");
        const width = canvas.width;
        const height = canvas.height;
        const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

        ctx.clearRect(0, 0, width, height);

        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "#07091d");
        gradient.addColorStop(0.55, "#030615");
        gradient.addColorStop(1, "#010208");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        drawNebula(ctx, width, height);

        const starCount = getStarCount();
        for (let i = 0; i < starCount; i++) {
          const rnd = seededRandom(i + 1);
          const x = rnd() * width;
          const y = rnd() * height;
          const radius = (0.45 + rnd() * 1.75) * dpr;
          const alpha = 0.42 + rnd() * 0.58;

          ctx.beginPath();
          ctx.fillStyle = `rgba(245, 248, 255, ${alpha})`;
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();

          if (i % 19 === 0) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(180, 200, 255, ${alpha * 0.34})`;
            ctx.lineWidth = 0.7 * dpr;
            ctx.moveTo(x - radius * 4.2, y);
            ctx.lineTo(x + radius * 4.2, y);
            ctx.moveTo(x, y - radius * 4.2);
            ctx.lineTo(x, y + radius * 4.2);
            ctx.stroke();
          }
        }
      }

      function drawNebula(ctx, width, height) {
        const glowCount = Math.min(6, Math.floor(getStarCount() / 80));
        for (let i = 0; i < glowCount; i++) {
          const rnd = seededRandom(10000 + i);
          const x = rnd() * width;
          const y = rnd() * height;
          const radius = Math.max(width, height) * (0.16 + rnd() * 0.16);
          const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);

          if (i % 2 === 0) {
            gradient.addColorStop(0, "rgba(121, 151, 255, 0.13)");
          } else {
            gradient.addColorStop(0, "rgba(198, 131, 255, 0.11)");
          }

          gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function seededRandom(seed) {
        let value = seed >>> 0;
        return function next() {
          value += 0x6D2B79F5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function bindEvents() {
        els.saveMemo.addEventListener("click", saveMemo);

        els.memoBody.addEventListener("input", () => {
          localStorage.setItem(STORAGE_KEYS.draft, els.memoBody.value);
        });

        els.clearDraft.addEventListener("click", () => {
          els.memoBody.value = "";
          localStorage.removeItem(STORAGE_KEYS.draft);
          showMessage("入力を消しました。");
        });

        els.goListFromWrite.addEventListener("click", () => showScreen("list"));
        els.goWriteFromList.addEventListener("click", () => showScreen("write"));
        els.backToList.addEventListener("click", () => showScreen("list"));
        els.editFromDetail.addEventListener("click", startEdit);
        els.cancelEdit.addEventListener("click", cancelEdit);
        els.saveEdit.addEventListener("click", saveEdit);

        els.deleteFromDetail.addEventListener("click", () => {
          if (state.currentMemoId) {
            requestDelete(state.currentMemoId);
          }
        });

        els.cancelDelete.addEventListener("click", cancelDelete);
        els.confirmDelete.addEventListener("click", confirmDelete);

        els.confirmDialog.addEventListener("click", (event) => {
          if (event.target === els.confirmDialog) {
            cancelDelete();
          }
        });

        window.addEventListener("resize", resizeCanvas);
      }

      function init() {
        loadState();
        bindEvents();
        renderStats();
        resizeCanvas();
        showScreen("write");
      }

      init();
    })();
  </script>
</body>
